name: release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: V__VERSION__
          releaseBody: |
            ## 更新内容
            - 新增基于 Windows file ID 的文件跟踪，外部重命名或移动文件后可继续定位已打开标签。
            - 保存、编译、运行与关闭标签前会优先解析文件新路径，降低外部改名后的丢失风险。
            - 未打开项目文件夹时，支持直接新建独立文件与工作目录。
            - 文件树空目录状态与路径映射逻辑已同步完善。

            ## 说明
            - 更新包通过 GitHub Releases 分发。
            - Windows 下安装更新时，应用可能会自动退出，这是安装器的正常行为。
            - 请从本页面的 Assets 中下载并安装对应版本。
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
